name: windows-build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Resolve version and date
        shell: pwsh
        run: |
          $version = uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])"
          if ('${{ github.ref_type }}' -eq 'tag') {
            $version = '${{ github.ref_name }}'.TrimStart('v')
          }
          $dateTag = Get-Date -Format 'yyyyMMdd'
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "DATE_TAG=$dateTag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Download open-source Chinese font
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path assets/fonts -Force | Out-Null
          $fontUrl = 'https://raw.githubusercontent.com/notofonts/noto-cjk/main/Sans/OTF/SimplifiedChinese/NotoSansCJKsc-Regular.otf'
          Invoke-WebRequest -Uri $fontUrl -OutFile assets/fonts/NotoSansCJKsc-Regular.otf

      - name: Run tests
        run: uv run pytest -q

      - name: Build onedir executable
        shell: pwsh
        run: |
          uv run pyinstaller launcher.py --noconfirm --clean --onedir --name supplier-analysis `
            --collect-all streamlit `
            --collect-all kaleido `
            --collect-submodules src `
            --add-data "assets;assets"

      - name: Smoke test launcher
        shell: pwsh
        run: |
          $listener = [System.Net.Sockets.TcpListener]::new([System.Net.IPAddress]::Parse("127.0.0.1"), 0)
          $listener.Start()
          $port = $listener.LocalEndpoint.Port
          $listener.Stop()

          $stdoutLog = Join-Path $env:RUNNER_TEMP "supplier-analysis-stdout.log"
          $stderrLog = Join-Path $env:RUNNER_TEMP "supplier-analysis-stderr.log"
          Remove-Item $stdoutLog, $stderrLog -ErrorAction SilentlyContinue

          $exe = Resolve-Path dist/supplier-analysis/supplier-analysis.exe
          $proc = Start-Process -FilePath $exe -ArgumentList "--no-browser","--port",$port -PassThru `
            -RedirectStandardOutput $stdoutLog `
            -RedirectStandardError $stderrLog
          try {
            $healthOk = $false
            $rootOk = $false
            $activePort = $null
            $lastProbeSummary = "n/a"

            $maxProbePort = [Math]::Min($port + 7, 65535)
            $candidatePorts = @($port..$maxProbePort)

            for ($i = 0; $i -lt 60; $i++) {
              if ($proc.HasExited) {
                throw "Launcher exited early (ExitCode=$($proc.ExitCode))"
              }

              $probeParts = @()
              foreach ($candidatePort in $candidatePorts) {
                $healthPass = $false
                $rootPass = $false
                $healthState = "n/a"
                $rootState = "skipped"

                try {
                  $healthResp = Invoke-WebRequest -Uri "http://127.0.0.1:$candidatePort/_stcore/health" -TimeoutSec 1 -SkipHttpErrorCheck
                  $healthBody = $healthResp.Content.Trim()
                  $healthState = "status=$($healthResp.StatusCode) body=$healthBody"
                  if ($healthResp.StatusCode -eq 200 -and $healthBody.ToLower() -eq "ok") {
                    $healthPass = $true
                  }
                } catch {
                  $healthState = "error=$($_.Exception.Message)"
                }

                if ($healthPass) {
                  try {
                    $rootResp = Invoke-WebRequest -Uri "http://127.0.0.1:$candidatePort/" -TimeoutSec 2 -SkipHttpErrorCheck
                    $rootState = "status=$($rootResp.StatusCode)"
                    if ($rootResp.StatusCode -ne 404) {
                      $rootPass = $true
                    }
                  } catch {
                    $rootState = "error=$($_.Exception.Message)"
                  }
                }

                $probeParts += "port=$candidatePort health=[$healthState] root=[$rootState]"

                if ($healthPass -and $rootPass) {
                  $healthOk = $true
                  $rootOk = $true
                  $activePort = $candidatePort
                  break
                }
              }

              $lastProbeSummary = ($probeParts -join " || ")

              if ($healthOk -and $rootOk) {
                Write-Host "Smoke test passed (requestedPort=$port activePort=$activePort)"
                break
              }

              Start-Sleep -Seconds 1
            }

            if (-not $healthOk -or -not $rootOk) {
              throw "Smoke test failed (requestedPort=$port activePort=$activePort healthOk=$healthOk rootOk=$rootOk lastProbe=$lastProbeSummary stdoutLog=$stdoutLog stderrLog=$stderrLog)"
            }
          } catch {
            Write-Host "=== launcher stdout tail ==="
            if (Test-Path $stdoutLog) {
              $stdoutTail = Get-Content $stdoutLog -Tail 120 -ErrorAction SilentlyContinue
              if ($stdoutTail) {
                $stdoutTail | ForEach-Object { Write-Host $_ }
              } else {
                Write-Host "<empty>"
              }
            } else {
              Write-Host "<missing file>"
            }

            Write-Host "=== launcher stderr tail ==="
            if (Test-Path $stderrLog) {
              $stderrTail = Get-Content $stderrLog -Tail 120 -ErrorAction SilentlyContinue
              if ($stderrTail) {
                $stderrTail | ForEach-Object { Write-Host $_ }
              } else {
                Write-Host "<empty>"
              }
            } else {
              Write-Host "<missing file>"
            }

            throw
          } finally {
            if (-not $proc.HasExited) {
              Stop-Process -Id $proc.Id -Force
            }
          }

      - name: Package zip artifact
        shell: pwsh
        run: |
          $artifactName = "supplier-analysis-v${env:VERSION}-win64-${env:DATE_TAG}"
          Compress-Archive -Path "dist/supplier-analysis/*" -DestinationPath "dist/$artifactName.zip" -Force
          "ARTIFACT_NAME=$artifactName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ARTIFACT_PATH=dist/$artifactName.zip" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error
